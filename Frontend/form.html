<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevÉlan - Submissions Viewer</title>
    <style>
        :root {
            --primary-night-blue: #1e3a8a; 
            --accent-blue: #3b82f6;
            --primary-cyan: #00d4ff; 
            --soft-white: #f5ede0;
            --deep-black: #161311;
            --muted-blue: #546877;
            --bg-grey: #e2e8f0; 
            --pure-white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-grey);
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.15) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.15) 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            color: var(--deep-black);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        header { width: 100%; padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; color: var(--deep-black); cursor: pointer; }
        .logo span { color: var(--primary-night-blue); }
        
        .nav-wrapper { display: flex; gap: 1rem; pointer-events: auto; align-items: center; }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--deep-black);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(30, 58, 138, 0.1);
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            border-color: rgba(30, 58, 138, 0.4);
        }

        .theme-toggle svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .theme-toggle .icon-sun { display: none; }
        [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
        [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

        nav {
            background: rgba(255, 255, 255, 0.35); 
            backdrop-filter: blur(8px); 
            padding: 0.4rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            gap: 0.2rem;
            box-shadow: 0 10px 30px rgba(30, 58, 138, 0.1);
        }

        nav a { text-decoration: none; color: var(--deep-black); font-weight: 700; font-size: 0.8rem; padding: 0.5rem 1.2rem; border-radius: 50px; transition: var(--transition); }
        nav a:hover { color: var(--primary-night-blue); }
        nav a.active { background: var(--primary-night-blue); color: white; }
        nav a.logout { color: #ef4444; }

        main {
            flex: 1;
            width: min(1520px, 100%);
            margin: 0 auto;
            padding: 0 clamp(1rem, 2.5vw, 2rem) 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 0;
        }
        
        .toolbar-row {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .search-container {
            flex: 1;
            min-width: 260px;
            background: var(--pure-white);
            padding: 0.8rem 1.5rem;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(30, 58, 138, 0.1);
            flex-shrink: 0;
        }

        .sort-container {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            background: var(--pure-white);
            border: 1px solid rgba(30, 58, 138, 0.1);
            border-radius: 999px;
            padding: 0.55rem 0.8rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .sort-container label {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--muted-blue);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .sort-select {
            border: 1px solid rgba(30, 58, 138, 0.18);
            border-radius: 999px;
            padding: 0.3rem 0.65rem;
            background: var(--pure-white);
            color: var(--deep-black);
            font-size: 0.78rem;
            font-weight: 700;
            outline: none;
        }

        .sort-select:focus {
            border-color: var(--primary-night-blue);
            box-shadow: 0 0 0 2px rgba(30, 58, 138, 0.18);
        }

        .search-container input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--deep-black);
        }

        .table-card {
            background: var(--pure-white);
            border-radius: 24px;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            min-height: 0; 
        }

        .table-scroll {
            flex: 1;
            min-height: 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .table-scroll:focus-visible {
            outline: 2px solid var(--primary-night-blue);
            outline-offset: 2px;
        }

        .table-header {
            display: grid;
            grid-template-columns: minmax(140px, 1.2fr) minmax(120px, 1fr) minmax(220px, 1.5fr) minmax(150px, 1fr) minmax(150px, 1fr) minmax(120px, 0.8fr) minmax(260px, 1.6fr);
            padding: 1.2rem 2rem;
            background: var(--deep-black);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-shrink: 0;
            column-gap: 0.75rem;
            min-width: 1320px;
        }

        .table-body {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            min-width: 1320px;
        }

        .row {
            display: grid;
            grid-template-columns: minmax(140px, 1.2fr) minmax(120px, 1fr) minmax(220px, 1.5fr) minmax(150px, 1fr) minmax(150px, 1fr) minmax(120px, 0.8fr) minmax(260px, 1.6fr);
            padding: 1.2rem 2rem;
            border-bottom: 1px solid var(--bg-grey);
            align-items: flex-start;
            font-size: 0.85rem;
            transition: 0.2s;
            column-gap: 0.75rem;
        }

        .row > div { min-width: 0; }

        .row-empty {
            grid-template-columns: 1fr;
            align-items: center;
        }

        .cell-empty {
            text-align: center;
            color: var(--muted-blue);
            font-weight: 700;
            padding: 0.25rem 0;
        }

        .row:hover { background: rgba(0, 212, 255, 0.03); }

        .tag-status { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        .status-done { background: #e7f7ed; color: #1e7e34; }
        .status-pending { background: #fff8e1; color: #b7791f; }
        .status-disabled { background: #f1f5f9; color: #94a3b8; }

        .repo-link-chip {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 800;
            font-size: 0.72rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(59, 130, 246, 0.35);
            border-radius: 999px;
            padding: 0.28rem 0.62rem;
            white-space: nowrap;
            max-width: 100%;
        }

        .repo-link-chip:hover {
            background: rgba(59, 130, 246, 0.08);
            text-decoration: none;
        }

        .btn-watch {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--primary-night-blue);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            width: fit-content;
        }

        .btn-watch:hover {
            transform: scale(1.05);
            background: var(--accent-blue);
        }

        .evaluation-cell {
            display: grid;
            gap: 0.4rem;
            width: 100%;
        }

        .eval-select,
        .feedback-input {
            width: 100%;
            border: 1px solid var(--bg-grey);
            border-radius: 8px;
            outline: none;
            font-size: 0.74rem;
            font-weight: 600;
            color: var(--deep-black);
            background: var(--pure-white);
        }

        .eval-select {
            min-height: 34px;
            padding: 0.35rem 0.5rem;
        }

        .feedback-input {
            min-height: 56px;
            padding: 0.45rem 0.55rem;
            resize: vertical;
            line-height: 1.35;
        }

        .eval-select:focus,
        .feedback-input:focus {
            border-color: var(--primary-night-blue);
            box-shadow: 0 0 0 2px rgba(30, 58, 138, 0.18);
        }

        .btn-eval-save {
            justify-self: start;
            border: none;
            border-radius: 8px;
            background: var(--deep-black);
            color: white;
            font-size: 0.72rem;
            font-weight: 800;
            padding: 0.38rem 0.7rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-eval-save:hover:not(:disabled) {
            background: var(--primary-night-blue);
        }

        .btn-eval-mail {
            justify-self: start;
            border: 1px solid rgba(30, 58, 138, 0.25);
            border-radius: 8px;
            background: rgba(30, 58, 138, 0.07);
            color: var(--primary-night-blue);
            font-size: 0.72rem;
            font-weight: 800;
            padding: 0.38rem 0.7rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-eval-mail:hover:not(:disabled) {
            background: rgba(30, 58, 138, 0.14);
        }

        .btn-eval-save:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .btn-eval-mail:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .mail-history-chip {
            justify-self: start;
            border: 1px dashed rgba(84, 104, 119, 0.45);
            border-radius: 8px;
            background: rgba(84, 104, 119, 0.08);
            color: var(--muted-blue);
            font-size: 0.66rem;
            font-weight: 800;
            padding: 0.32rem 0.62rem;
            cursor: help;
            user-select: none;
        }

        .eval-message {
            min-height: 1em;
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--muted-blue);
        }

        .eval-message.success {
            color: #166534;
        }

        .eval-message.error {
            color: #b91c1c;
        }

        /* --- Video Modal --- */
        .video-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--deep-black);
            width: 100%;
            max-width: 1000px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 80px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .close-modal {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2.4;
            stroke-linecap: round;
        }

        .close-modal:hover { background: #ef4444; }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(30, 58, 138, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-night-blue); }

        [data-theme="dark"] {
            --dark-bg: #0d1110;
            --dark-surface: #18201e;
            --dark-surface-2: #24302d;
            --dark-text: #f3f6f2;
            --dark-muted: #b7c2bb;
            --dark-accent: #2ec4b6;
            --dark-highlight: #9fe870;
            --dark-premium: #c9883d;
            --primary-night-blue: var(--dark-accent);
            --accent-blue: var(--dark-accent);
            --primary-cyan: var(--dark-highlight);
        }

        [data-theme="dark"] body {
            background-color: var(--dark-bg);
            color: var(--dark-text);
            background-image:
                linear-gradient(rgba(46, 196, 182, 0.11) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(201, 136, 61, 0.08) 1.5px, transparent 1.5px);
        }

        [data-theme="dark"] .logo,
        [data-theme="dark"] nav a,
        [data-theme="dark"] .search-container input,
        [data-theme="dark"] .row,
        [data-theme="dark"] .table-header,
        [data-theme="dark"] .modal-header h3 {
            color: var(--dark-text);
        }

        [data-theme="dark"] .logo span {
            color: var(--dark-accent);
        }

        [data-theme="dark"] nav {
            background: rgba(22, 24, 32, 0.88);
            border-color: rgba(46, 196, 182, 0.35);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        [data-theme="dark"] nav a:hover {
            color: var(--dark-accent);
        }

        [data-theme="dark"] nav a.active {
            color: #072824;
            box-shadow: 0 4px 15px rgba(46, 196, 182, 0.3);
        }

        [data-theme="dark"] .theme-toggle {
            background: rgba(22, 24, 32, 0.94);
            border-color: rgba(46, 196, 182, 0.35);
            color: var(--dark-text);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        [data-theme="dark"] .theme-toggle:hover {
            border-color: var(--dark-premium);
            background: rgba(201, 136, 61, 0.2);
        }

        [data-theme="dark"] .search-container,
        [data-theme="dark"] .table-card {
            background: rgba(26, 29, 38, 0.92);
            border-color: rgba(46, 196, 182, 0.22);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
        }

        [data-theme="dark"] .sort-container {
            background: rgba(26, 29, 38, 0.92);
            border-color: rgba(46, 196, 182, 0.22);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
        }

        [data-theme="dark"] .sort-container label {
            color: var(--dark-muted);
        }

        [data-theme="dark"] .sort-select {
            background: #12151e;
            border-color: #2f3645;
            color: var(--dark-text);
        }

        [data-theme="dark"] .repo-link-chip {
            border-color: rgba(46, 196, 182, 0.45);
            color: var(--dark-accent);
        }

        [data-theme="dark"] .repo-link-chip:hover {
            background: rgba(46, 196, 182, 0.12);
        }

        [data-theme="dark"] .search-container input::placeholder {
            color: #8f8372;
        }

        [data-theme="dark"] .table-header {
            background: #151925;
        }

        [data-theme="dark"] .row {
            border-bottom-color: #31384a;
        }

        [data-theme="dark"] .row:hover {
            background: rgba(46, 196, 182, 0.14);
        }

        [data-theme="dark"] .eval-select,
        [data-theme="dark"] .feedback-input {
            background: #12151e;
            border-color: #2f3645;
            color: var(--dark-text);
        }

        [data-theme="dark"] .feedback-input::placeholder {
            color: #8a94a8;
        }

        [data-theme="dark"] .btn-eval-save {
            background: var(--dark-accent);
            color: #072824;
        }

        [data-theme="dark"] .btn-eval-save:hover:not(:disabled) {
            background: #26aea1;
        }

        [data-theme="dark"] .btn-eval-mail {
            border-color: rgba(46, 196, 182, 0.4);
            background: rgba(46, 196, 182, 0.15);
            color: var(--dark-accent);
        }

        [data-theme="dark"] .btn-eval-mail:hover:not(:disabled) {
            background: rgba(46, 196, 182, 0.24);
        }

        [data-theme="dark"] .mail-history-chip {
            border-color: rgba(183, 194, 187, 0.4);
            background: rgba(183, 194, 187, 0.15);
            color: var(--dark-muted);
        }

        [data-theme="dark"] .eval-message {
            color: var(--dark-muted);
        }

        [data-theme="dark"] .eval-message.success {
            color: #86efac;
        }

        [data-theme="dark"] .eval-message.error {
            color: #fca5a5;
        }

        [data-theme="dark"] .status-done { background: rgba(159, 232, 112, 0.2); color: var(--dark-highlight); }
        [data-theme="dark"] .status-pending { background: rgba(201, 136, 61, 0.2); color: var(--dark-premium); }
        [data-theme="dark"] .status-disabled { background: rgba(100, 116, 139, 0.28); color: #cbd5e1; }

        [data-theme="dark"] .video-modal {
            background: rgba(10, 10, 14, 0.84);
        }

        [data-theme="dark"] .modal-content {
            background: rgba(26, 29, 38, 0.96);
            border-color: rgba(46, 196, 182, 0.28);
        }

        [data-theme="dark"] .modal-header p {
            color: var(--dark-muted);
        }

        @media (max-width: 1024px) {
            header {
                padding: 1rem 1.25rem;
                flex-wrap: wrap;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .nav-wrapper {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 0.75rem;
            }

            main {
                padding: 0 1.25rem 1.5rem;
                gap: 0.875rem;
            }

            .search-container {
                border-radius: 16px;
                padding: 0.7rem 1rem;
            }

            .sort-container {
                border-radius: 16px;
                padding: 0.5rem 0.7rem;
            }

            .table-header,
            .row {
                padding: 1rem 1.25rem;
            }

            .table-header,
            .table-body {
                min-width: 1150px;
            }
        }

        @media (max-width: 768px) {
            main {
                padding: 0 1rem 1.25rem;
            }

            .search-container {
                border-radius: 14px;
                padding: 0.65rem 0.9rem;
            }

            .toolbar-row {
                flex-direction: column;
                align-items: stretch;
            }

            .sort-container {
                width: 100%;
                justify-content: space-between;
                border-radius: 14px;
            }

            .sort-select {
                width: min(62%, 220px);
            }

            .table-header {
                font-size: 0.62rem;
                letter-spacing: 0.6px;
            }

            .table-header,
            .row {
                padding: 0.85rem 1rem;
            }

            .table-header,
            .table-body {
                min-width: 1060px;
            }

            .btn-watch {
                padding: 5px 9px;
                font-size: 0.7rem;
            }

            .video-modal {
                padding: 1rem;
            }

            .modal-header {
                padding: 0.9rem 1rem;
            }
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">Dev<span>Élan.</span></div>
        <div class="nav-wrapper">
            <nav>
                <a href="/admin">Management</a>
                <a href="/submissions" class="active">Submissions</a>
            </nav>
            <nav>
                <a href="#" class="logout" id="logoutLink">Logout</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="toolbar-row">
            <div class="search-container">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--muted-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Search by Name, Reg No or Project..." onkeyup="filterSubmissions()">
            </div>
            <div class="sort-container">
                <label for="sortSelect">Sort</label>
                <select id="sortSelect" class="sort-select" aria-label="Sort submissions list">
                    <option value="uploaded_desc">Latest Upload</option>
                    <option value="name_asc">Name (A-Z)</option>
                    <option value="register_asc">Register No (A-Z)</option>
                </select>
            </div>
        </div>

        <div class="table-card">
            <div class="table-scroll" tabindex="0" aria-label="Submissions table horizontal scroll area">
                <div class="table-header">
                    <div>User Name</div>
                    <div>Reg No</div>
                    <div>Project / Repo</div>
                    <div>Meeting Video</div>
                    <div>Demo Video</div>
                    <div>Status</div>
                    <div>Evaluation / Feedback</div>
                </div>
                <div class="table-body" id="tableBody">
                    <div class="row row-empty">
                        <div class="cell-empty">Loading submissions...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Video Modal -->
    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h3 id="modalTitle" style="font-size: 1rem; font-weight: 800; margin-bottom: 2px;">Reviewing Submission</h3>
                    <p id="modalSubtitle" style="font-size: 0.75rem; color: var(--muted-blue); font-weight: 600;"></p>
                </div>
                <button class="close-modal" onclick="closeVideo()" aria-label="Close video modal">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="video-container">
                <video id="submissionVideo" controls poster="https://via.placeholder.com/1280x720/161311/ffffff?text=Loading+Evaluation+Recording...">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>

    <script>
        const logoutLink = document.getElementById('logoutLink');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const tableBody = document.getElementById('tableBody');
        const API_ROOTS = (() => {
            const candidates = [];
            const origin = window.location && window.location.origin && window.location.origin !== 'null'
                ? window.location.origin
                : '';
            const explicitApiRoot = String(window.DEVELA_API_ROOT || '').trim();
            const normalizedExplicitApiRoot = explicitApiRoot ? explicitApiRoot.replace(/\/+$/, '') : '';

            if (normalizedExplicitApiRoot) {
                candidates.push(normalizedExplicitApiRoot);
            }

            if (origin) {
                candidates.push(`${origin}/api/v1`);
            }

            return candidates.filter((value, index, list) => value && list.indexOf(value) === index);
        })();
        const storedApiRoot = localStorage.getItem('devela-api-root');
        let activeApiRoot = storedApiRoot && API_ROOTS.includes(storedApiRoot) ? storedApiRoot : API_ROOTS[0];
        const AUTH_TOKEN_KEY = 'devela-access-token';
        const AUTH_ROLE_KEY = 'devela-user-role';
        const AUTH_USER_ID_KEY = 'devela-user-id';
        let searchTimer = null;
        let lastLoadedSubmissions = [];

        function getApiRoots() {
            const merged = [activeApiRoot, ...API_ROOTS];
            return merged.filter((value, index) => value && merged.indexOf(value) === index);
        }

        async function fetchWithFallback(path, options) {
            let lastError = null;
            const candidates = getApiRoots();

            for (const candidate of candidates) {
                try {
                    const response = await fetch(`${candidate}${path}`, options);
                    activeApiRoot = candidate;
                    localStorage.setItem('devela-api-root', candidate);
                    return response;
                } catch (error) {
                    lastError = error;
                }
            }

            throw new Error(
                `Unable to reach backend at ${candidates.join(' or ')}.`
            );
        }

        function getToken() {
            return localStorage.getItem(AUTH_TOKEN_KEY);
        }

        function clearSession() {
            localStorage.removeItem(AUTH_TOKEN_KEY);
            localStorage.removeItem(AUTH_ROLE_KEY);
            localStorage.removeItem(AUTH_USER_ID_KEY);
            window.location.href = '/';
        }

        function requireAdminSession() {
            const role = localStorage.getItem(AUTH_ROLE_KEY);
            if (role !== 'admin') {
                window.location.href = '/';
            }
        }

        async function apiFetch(path, options = {}) {
            const token = getToken();
            if (!token) {
                clearSession();
                throw new Error('Missing authentication token.');
            }

            const response = await fetchWithFallback(path, {
                ...options,
                headers: {
                    ...(options.headers || {}),
                    Authorization: `Bearer ${token}`,
                },
            });

            const payload = await response.json().catch(() => ({}));
            if (response.status === 401) {
                clearSession();
                throw new Error('Session expired. Please log in again.');
            }
            if (!response.ok) {
                throw new Error(payload.detail || `Request failed (${response.status}).`);
            }
            return payload;
        }

        function statusClass(status) {
            const normalized = String(status || '').toLowerCase();
            if (normalized === 'submitted') {
                return 'status-done';
            }
            if (normalized === 'no-video') {
                return 'status-disabled';
            }
            return 'status-pending';
        }

        function statusLabel(status) {
            const normalized = String(status || 'pending').replace(/-/g, ' ');
            return normalized.replace(/\b\w/g, (ch) => ch.toUpperCase());
        }

        function makeEmptyRow(message) {
            const row = document.createElement('div');
            row.className = 'row row-empty';

            const content = document.createElement('div');
            content.className = 'cell-empty';
            content.textContent = message;

            row.appendChild(content);
            return row;
        }

        function normalizeEvaluationDecision(rawDecision) {
            const normalized = String(rawDecision || '').trim().toLowerCase();
            if (normalized === 'accepted' || normalized === 'rejected') {
                return normalized;
            }
            return 'pending';
        }

        function formatMailTypeLabel(rawType) {
            const normalized = String(rawType || '').trim().toLowerCase();
            if (!normalized) {
                return 'Not sent yet';
            }
            return normalized.replace(/[_-]/g, ' ').replace(/\b\w/g, (letter) => letter.toUpperCase());
        }

        function formatMailTimestamp(rawTimestamp) {
            if (!rawTimestamp) {
                return 'Not sent yet';
            }

            const parsed = new Date(rawTimestamp);
            if (Number.isNaN(parsed.getTime())) {
                return String(rawTimestamp);
            }

            return parsed.toLocaleString(undefined, {
                year: 'numeric',
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
            });
        }

        function buildMailHistoryTooltip(item) {
            const sentCount = Number(item?.mail_sent_count || 0);
            return [
                `Mail Sent Count: ${sentCount}`,
                `Last Mail Type: ${formatMailTypeLabel(item?.last_mail_type)}`,
                `Last Sent Time: ${formatMailTimestamp(item?.last_mail_sent_at)}`,
            ].join('\n');
        }

        function sortSubmissions(items, sortMode) {
            const list = Array.isArray(items) ? [...items] : [];
            if (sortMode === 'name_asc') {
                return list.sort((a, b) => String(a?.user_name || '').localeCompare(String(b?.user_name || ''), undefined, { sensitivity: 'base' }));
            }
            if (sortMode === 'register_asc') {
                return list.sort((a, b) => String(a?.register_no || '').localeCompare(String(b?.register_no || ''), undefined, { numeric: true, sensitivity: 'base' }));
            }
            return list;
        }

        function renderSubmissions(items) {
            tableBody.innerHTML = '';
            if (!Array.isArray(items) || items.length === 0) {
                tableBody.appendChild(makeEmptyRow('No submissions found for the current filter.'));
                return;
            }

            items.forEach((item) => {
                const row = document.createElement('div');
                row.className = 'row';

                const userCell = document.createElement('div');
                userCell.style.fontWeight = '700';
                userCell.textContent = item.user_name || '--';

                const regCell = document.createElement('div');
                regCell.style.color = 'var(--muted-blue)';
                regCell.textContent = item.register_no || '--';

                const repoCell = document.createElement('div');
                if (item.repo_link) {
                    const repoLink = document.createElement('a');
                    repoLink.className = 'repo-link-chip';
                    repoLink.href = item.repo_link;
                    repoLink.target = '_blank';
                    repoLink.rel = 'noopener noreferrer';
                    repoLink.setAttribute('aria-label', 'Open repository in a new tab');
                    repoLink.title = item.repo_link;
                    repoLink.textContent = 'Open Repo';
                    repoCell.appendChild(repoLink);
                } else {
                    repoCell.style.color = 'var(--muted-blue)';
                    repoCell.textContent = '-- No Repo Yet --';
                }

                const meetingVideoCell = document.createElement('div');
                const meetingVideoId = item.meeting_video_id || item.video_id;
                if (meetingVideoId) {
                    const watchButton = document.createElement('button');
                    watchButton.className = 'btn-watch';
                    watchButton.type = 'button';
                    watchButton.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Watch Meeting';
                    watchButton.addEventListener('click', () => {
                        openVideo(meetingVideoId, item.user_name, item.project_title);
                    });
                    meetingVideoCell.appendChild(watchButton);
                } else {
                    const noVideoTag = document.createElement('span');
                    noVideoTag.className = 'tag-status status-disabled';
                    noVideoTag.textContent = 'No Video';
                    meetingVideoCell.appendChild(noVideoTag);
                }

                const demoVideoCell = document.createElement('div');
                if (item.demo_video_id) {
                    const demoWatchButton = document.createElement('button');
                    demoWatchButton.className = 'btn-watch';
                    demoWatchButton.type = 'button';
                    demoWatchButton.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Watch Demo';
                    demoWatchButton.addEventListener('click', () => {
                        openVideo(item.demo_video_id, item.user_name, item.project_title);
                    });
                    demoVideoCell.appendChild(demoWatchButton);
                } else {
                    const optionalTag = document.createElement('span');
                    optionalTag.className = 'tag-status status-disabled';
                    optionalTag.textContent = 'Optional';
                    demoVideoCell.appendChild(optionalTag);
                }

                const statusCell = document.createElement('div');
                const statusTag = document.createElement('span');
                statusTag.className = `tag-status ${statusClass(item.status)}`;
                statusTag.textContent = statusLabel(item.status);
                statusCell.appendChild(statusTag);

                const evaluationCell = document.createElement('div');
                evaluationCell.className = 'evaluation-cell';

                const decisionSelect = document.createElement('select');
                decisionSelect.className = 'eval-select';
                decisionSelect.innerHTML = [
                    '<option value="pending">Pending Review</option>',
                    '<option value="accepted">Accepted</option>',
                    '<option value="rejected">Rejected</option>',
                ].join('');
                decisionSelect.value = normalizeEvaluationDecision(item.evaluation_decision);

                const feedbackInput = document.createElement('textarea');
                feedbackInput.className = 'feedback-input';
                feedbackInput.rows = 2;
                feedbackInput.maxLength = 2000;
                feedbackInput.placeholder = 'Type evaluation feedback for this student...';
                feedbackInput.value = item.admin_feedback || '';

                const saveButton = document.createElement('button');
                saveButton.className = 'btn-eval-save';
                saveButton.type = 'button';
                saveButton.textContent = 'Save';

                const sendMailButton = document.createElement('button');
                sendMailButton.className = 'btn-eval-mail';
                sendMailButton.type = 'button';

                const historyChip = document.createElement('span');
                historyChip.className = 'mail-history-chip';

                function refreshMailHistoryTooltip() {
                    const sentCount = Number(item.mail_sent_count || 0);
                    historyChip.textContent = sentCount > 0 ? `Mail History (${sentCount})` : 'Mail History';
                    historyChip.title = buildMailHistoryTooltip(item);
                }

                function refreshSendMailLabel() {
                    const sentCount = Number(item.mail_sent_count || 0);
                    sendMailButton.textContent = sentCount > 0 ? 'Send Feedback Mail' : 'Send Acceptance Mail';
                }

                refreshSendMailLabel();
                refreshMailHistoryTooltip();

                const evaluationMessage = document.createElement('p');
                evaluationMessage.className = 'eval-message';

                saveButton.addEventListener('click', async () => {
                    const selectedDecision = normalizeEvaluationDecision(decisionSelect.value);
                    const feedbackText = feedbackInput.value.trim();

                    saveButton.disabled = true;
                    saveButton.textContent = 'Saving...';
                    evaluationMessage.textContent = '';
                    evaluationMessage.classList.remove('success', 'error');

                    try {
                        const result = await apiFetch('/submissions/update-evaluation', {
                            method: 'PATCH',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                submission_id: item.submission_id,
                                evaluation_decision: selectedDecision,
                                admin_feedback: feedbackText || null,
                            }),
                        });

                        item.evaluation_decision = result.evaluation_decision;
                        item.admin_feedback = result.admin_feedback;
                        decisionSelect.value = normalizeEvaluationDecision(result.evaluation_decision);
                        feedbackInput.value = result.admin_feedback || '';
                        evaluationMessage.textContent = 'Saved';
                        evaluationMessage.classList.add('success');
                    } catch (error) {
                        evaluationMessage.textContent = error.message || 'Failed to save evaluation.';
                        evaluationMessage.classList.add('error');
                    } finally {
                        saveButton.disabled = false;
                        saveButton.textContent = 'Save';
                    }
                });

                sendMailButton.addEventListener('click', async () => {
                    const selectedDecision = normalizeEvaluationDecision(decisionSelect.value);
                    const feedbackText = feedbackInput.value.trim();

                    sendMailButton.disabled = true;
                    sendMailButton.textContent = 'Sending...';
                    evaluationMessage.textContent = '';
                    evaluationMessage.classList.remove('success', 'error');

                    async function sendMail(sendAnyway = false) {
                        return apiFetch('/submissions/send-evaluation-mail', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                submission_id: item.submission_id,
                                send_anyway: sendAnyway,
                            }),
                        });
                    }

                    try {
                        const saveResult = await apiFetch('/submissions/update-evaluation', {
                            method: 'PATCH',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                submission_id: item.submission_id,
                                evaluation_decision: selectedDecision,
                                admin_feedback: feedbackText || null,
                            }),
                        });

                        item.evaluation_decision = saveResult.evaluation_decision;
                        item.admin_feedback = saveResult.admin_feedback;
                        decisionSelect.value = normalizeEvaluationDecision(saveResult.evaluation_decision);
                        feedbackInput.value = saveResult.admin_feedback || '';

                        let mailResult = await sendMail(false);

                        if (mailResult.needs_confirmation) {
                            const shouldForceSend = window.confirm(mailResult.message || 'Mail already sent once. Send anyway?');
                            if (!shouldForceSend) {
                                evaluationMessage.textContent = 'Mail send cancelled.';
                                evaluationMessage.classList.add('error');
                                return;
                            }
                            mailResult = await sendMail(true);
                        }

                        item.mail_sent_count = Number(mailResult.mail_sent_count || 0);
                        item.last_mail_type = mailResult.mail_type || null;
                        item.last_mail_sent_at = mailResult.last_mail_sent_at || item.last_mail_sent_at || null;
                        evaluationMessage.textContent = mailResult.message || 'Mail sent successfully.';
                        evaluationMessage.classList.add('success');
                    } catch (error) {
                        evaluationMessage.textContent = error.message || 'Failed to send mail.';
                        evaluationMessage.classList.add('error');
                    } finally {
                        sendMailButton.disabled = false;
                        refreshSendMailLabel();
                        refreshMailHistoryTooltip();
                    }
                });

                evaluationCell.appendChild(decisionSelect);
                evaluationCell.appendChild(feedbackInput);
                evaluationCell.appendChild(saveButton);
                evaluationCell.appendChild(sendMailButton);
                evaluationCell.appendChild(historyChip);
                evaluationCell.appendChild(evaluationMessage);

                row.appendChild(userCell);
                row.appendChild(regCell);
                row.appendChild(repoCell);
                row.appendChild(meetingVideoCell);
                row.appendChild(demoVideoCell);
                row.appendChild(statusCell);
                row.appendChild(evaluationCell);

                tableBody.appendChild(row);
            });
        }

        async function loadSubmissions(filterValue = '') {
            tableBody.innerHTML = '';
            tableBody.appendChild(makeEmptyRow('Loading submissions...'));

            try {
                const params = new URLSearchParams({
                    page: '1',
                    limit: '100',
                });
                const normalized = filterValue.trim();
                if (normalized) {
                    params.set('filter_query', normalized);
                }

                const result = await apiFetch(`/submissions/list?${params.toString()}`);
                lastLoadedSubmissions = Array.isArray(result.submissions) ? result.submissions : [];
                const selectedSortMode = sortSelect ? sortSelect.value : 'uploaded_desc';
                renderSubmissions(sortSubmissions(lastLoadedSubmissions, selectedSortMode));
            } catch (error) {
                tableBody.innerHTML = '';
                tableBody.appendChild(makeEmptyRow(error.message || 'Unable to load submissions.'));
            }
        }

        function filterSubmissions() {
            const query = searchInput.value;
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                loadSubmissions(query);
            }, 300);
        }

        function applySort() {
            const selectedSortMode = sortSelect ? sortSelect.value : 'uploaded_desc';
            renderSubmissions(sortSubmissions(lastLoadedSubmissions, selectedSortMode));
        }

        const modal = document.getElementById('videoModal');
        const video = document.getElementById('submissionVideo');
        const modalTitle = document.getElementById('modalTitle');
        const modalSubtitle = document.getElementById('modalSubtitle');

        async function openVideo(videoId, userName, project) {
            modal.style.display = 'flex';
            modalTitle.innerText = userName;
            modalSubtitle.innerText = `Project: ${project}`;

            try {
                const tokenPayload = await apiFetch(`/video/stream-token/${videoId}`);
                const streamToken = String(tokenPayload.stream_token || '').trim();
                if (!streamToken) {
                    throw new Error('Unable to generate stream token for selected video.');
                }

                const apiRoot = activeApiRoot || getApiRoots()[0];
                if (!apiRoot) {
                    throw new Error('Unable to resolve backend stream URL.');
                }

                video.preload = 'metadata';
                video.src = `${apiRoot}/video/stream/${videoId}?st=${encodeURIComponent(streamToken)}`;
                video.load();
                video.currentTime = 0;
                await video.play().catch(() => {});
            } catch (error) {
                modalSubtitle.innerText = error.message || 'Failed to stream selected video.';
            }
        }

        function closeVideo() {
            modal.style.display = 'none';
            video.pause();
            video.removeAttribute('src');
            video.load();
        }

        async function handleLogout(event) {
            event.preventDefault();
            try {
                await apiFetch('/auth/logout', { method: 'POST' });
            } catch (_) {
                // Ignore logout errors.
            } finally {
                clearSession();
            }
        }

        // Close modal on background click or escape key
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeVideo();
        });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeVideo();
        });

        if (logoutLink) {
            logoutLink.addEventListener('click', handleLogout);
        }

        if (sortSelect) {
            sortSelect.addEventListener('change', applySort);
        }

        requireAdminSession();
        loadSubmissions();
    </script>
</body>
</html>
